server:
  host: 0.0.0.0
  port: 9091

log:
  level: info

jwt_secret: "{{ secret '/run/secrets/authelia_jwt_secret' }}"

identity_validation:
  reset_password:
    jwt_lifespan: 30m

authentication_backend:
  file:
    path: /config/users_database.yml
    password:
      algorithm: argon2id

access_control:
  default_policy: one_factor
  rules:
    - domain:
        - helios.lan
        - helios.ian
        - m1-mac-mini.tailfc238d.ts.net
      policy: one_factor

session:
  secret: "{{ secret '/run/secrets/authelia_session_secret' }}"
  cookies:
    - name: helios_session
      domain: helios.lan
      authelia_url: https://helios.lan/auth
      expiration: 12h
      inactivity: 4h
    - name: helios_session_ian
      domain: helios.ian
      authelia_url: https://helios.ian/auth
      expiration: 12h
      inactivity: 4h
    - name: helios_session_ts
      domain: m1-mac-mini.tailfc238d.ts.net
      authelia_url: https://m1-mac-mini.tailfc238d.ts.net/auth
      expiration: 12h
      inactivity: 4h

storage:
  encryption_key: "{{ secret '/run/secrets/authelia_storage_key' }}"
  local:
    path: /config/db.sqlite3

notifier:
  filesystem:
    filename: /config/notification.txt
