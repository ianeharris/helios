name: helios

services:

  # ── Database ─────────────────────────────────────────────────────────────────

  db:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: helios
      POSTGRES_USER: helios
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helios"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Message broker ────────────────────────────────────────────────────────────

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/acl:/mosquitto/config/acl:ro
      - ./mosquitto/passwd:/mosquitto/config/passwd:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    ports:
      - "127.0.0.1:1883:1883"

  # ── API ───────────────────────────────────────────────────────────────────────

  api:
    image: ghcr.io/ianeharris/helios-api:${HELIOS_VERSION:?HELIOS_VERSION is required}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      mosquitto:
        condition: service_started
    environment:
      DATABASE_URL: postgres://helios:${DB_PASSWORD}@db:5432/helios
      MQTT_URL: mqtt://api:${MQTT_PASSWORD_API}@mosquitto:1883
      PORT: "3000"
    secrets:
      - db_password
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Adapters ──────────────────────────────────────────────────────────────────
  # Each adapter is a separate container - they fail independently.
  # Phase 1+ images; commented out until the relevant phase starts.

  adapter-octopus:
    image: ghcr.io/ianeharris/helios-adapter-octopus:${HELIOS_VERSION:?HELIOS_VERSION is required}
    restart: unless-stopped
    depends_on: [mosquitto]
    environment:
      MQTT_URL: mqtt://octopus:${MQTT_PASSWORD_OCTOPUS}@mosquitto:1883
      OCTOPUS_ACCOUNT: A-B240C957
      OCTOPUS_IMPORT_MPAN: "1013041723586"
      OCTOPUS_EXPORT_MPAN: "1050003544656"
      OCTOPUS_IMPORT_PRODUCT: INTELLI-VAR-24-10-29
      OCTOPUS_IMPORT_TARIFF: E-1R-INTELLI-VAR-24-10-29-A
      OCTOPUS_EXPORT_PRODUCT: OUTGOING-VAR-24-10-26
      OCTOPUS_EXPORT_TARIFF: E-1R-OUTGOING-VAR-24-10-26-A
    secrets:
      - octopus_api_key

  adapter-foxess:
    image: ghcr.io/ianeharris/helios-adapter-foxess:${HELIOS_VERSION:?HELIOS_VERSION is required}
    restart: unless-stopped
    depends_on: [mosquitto]
    environment:
      MQTT_URL: mqtt://foxess:${MQTT_PASSWORD_FOXESS}@mosquitto:1883
    secrets:
      - foxess_api_key

  adapter-hue:
    image: ghcr.io/ianeharris/helios-adapter-hue:${HELIOS_VERSION:?HELIOS_VERSION is required}
    restart: unless-stopped
    depends_on: [mosquitto]
    # Host networking lets local-only mDNS discovery reach Hue Bridge v2.
    # Mosquitto is bound to loopback on the M1 for this adapter.
    network_mode: host
    environment:
      HUE_BRIDGES: >-
        [{"id":"ECB5FAFFFE2CA569","name":"Bradgate"},{"id":"ECB5FAFFFEBE1854","name":"Bradgate 2"}]
      HUE_DISCOVERY_CACHE_PATH: /var/lib/helios/hue-bridges.json
      MQTT_URL: mqtt://hue:${MQTT_PASSWORD_HUE}@127.0.0.1:1883
    volumes:
      - hue_discovery_cache:/var/lib/helios
    secrets:
      - hue_app_key_bradgate
      - hue_app_key_bradgate2

  # ── Web frontend ─────────────────────────────────────────────────────────────

  web:
    image: ghcr.io/ianeharris/helios-web:${HELIOS_VERSION:?HELIOS_VERSION is required}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  # ── Reverse proxy + auth ──────────────────────────────────────────────────────

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on: [api, web, authelia]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  authelia:
    image: authelia/authelia:4
    restart: unless-stopped
    volumes:
      - ./authelia/configuration.yml:/config/configuration.yml:ro
      - ./authelia/users_database.yml:/config/users_database.yml
      - authelia_data:/config
    secrets:
      - authelia_jwt_secret
      - authelia_session_secret
      - authelia_storage_key

  # ── Observability ─────────────────────────────────────────────────────────────

  grafana:
    image: grafana/grafana-oss:11.1.0
    restart: unless-stopped
    depends_on: [db]
    environment:
      GF_SERVER_ROOT_URL: https://helios.lan/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_AUTH_PROXY_ENABLED: "true"
      GF_SECURITY_ADMIN_PASSWORD_FILE: /run/secrets/grafana_admin_password
    secrets:
      - grafana_admin_password
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:3001:3000"

  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"

# ── Secrets (Docker secrets from SOPS-decrypted files at deploy time) ──────────

secrets:
  db_password:
    file: ./secrets/db_password.txt
  authelia_jwt_secret:
    file: ./secrets/authelia_jwt_secret.txt
  authelia_session_secret:
    file: ./secrets/authelia_session_secret.txt
  authelia_storage_key:
    file: ./secrets/authelia_storage_key.txt
  grafana_admin_password:
    file: ./secrets/grafana_admin_password.txt
  octopus_api_key:
    file: ./secrets/octopus_api_key.txt
  foxess_api_key:
    file: ./secrets/foxess_api_key.txt
  hue_app_key_bradgate:
    file: ./secrets/hue_app_key_bradgate.txt
  hue_app_key_bradgate2:
    file: ./secrets/hue_app_key_bradgate2.txt

# ── Volumes ───────────────────────────────────────────────────────────────────

volumes:
  db_data:
  mosquitto_data:
  mosquitto_log:
  caddy_data:
  caddy_config:
  authelia_data:
  grafana_data:
  prometheus_data:
  hue_discovery_cache:
