}

.btn:focus-visible {

svg {

  height: auto;
}

#widget &gt; svg {

}

.text-warning,

    (() =&gt; {
      const root = document.getElementById(&#x27;helios-control-surface&#x27;);
      if (!root) return;
      const setView = (view) =&gt; {
        root.dataset.view = view;
        root.querySelectorAll(&#x27;[data-view-target]&#x27;).forEach((button) =&gt; {
          const active = button.dataset.viewTarget === view;
          button.classList.toggle(&#x27;is-active&#x27;, active);
          button.setAttribute(&#x27;aria-pressed&#x27;, String(active));
        });
      };
      root.querySelectorAll(&#x27;[data-view-target]&#x27;).forEach((button) =&gt; {
        button.addEventListener(&#x27;click&#x27;, () =&gt; setView(button.dataset.viewTarget));
      });
      root.querySelectorAll(&#x27;.mode-button&#x27;).forEach((button) =&gt; {
        button.addEventListener(&#x27;click&#x27;, () =&gt; {
          root.querySelectorAll(&#x27;.mode-button&#x27;).forEach((item) =&gt; {
            const active = item === button;
            item.classList.toggle(&#x27;is-active&#x27;, active);
            item.setAttribute(&#x27;aria-pressed&#x27;, String(active));
          });
        });
      });
      const sendScene = (button) =&gt; {
        const scene = button.dataset.scene;
        const message = button.closest(&#x27;.surface&#x27;).querySelector(&#x27;.command-message&#x27;);
        button.disabled = true;
        message.textContent = `Sending ${scene}...`;
        message.classList.add(&#x27;is-pending&#x27;);
        window.setTimeout(() =&gt; {
          message.textContent = `${scene} confirmed from the room.`;
          message.classList.remove(&#x27;is-pending&#x27;);
          button.disabled = false;
        }, 700);
      };
      root.querySelectorAll(&#x27;[data-scene]&#x27;).forEach((button) =&gt; button.addEventListener(&#x27;click&#x27;, () =&gt; sendScene(button)));
      root.querySelectorAll(&#x27;.minor-button&#x27;).forEach((button) =&gt; {
        button.addEventListener(&#x27;click&#x27;, () =&gt; {
          button.classList.toggle(&#x27;is-on&#x27;);
          const icon = button.querySelector(&#x27;svg&#x27;);
          if (icon) icon.setAttribute(&#x27;data-lucide&#x27;, button.classList.contains(&#x27;is-on&#x27;) ? &#x27;power&#x27; : &#x27;power&#x27;);
          const message = button.closest(&#x27;.surface&#x27;).querySelector(&#x27;.command-message&#x27;);
          message.textContent = &#x27;Command confirmed from the room.&#x27;;
        });
