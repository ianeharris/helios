name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:

  lint-typecheck:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Get Yarn cache directory
        id: yarn-cache
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build shared packages
        run: yarn workspace @helios/shared build

      - name: Typecheck
        run: yarn typecheck

      - name: Lint
        run: yarn lint

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Get Yarn cache directory
        id: yarn-cache
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run tests
        run: yarn test

  build-images:
    name: Build & push images
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only push on main; PRs build only (no push)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint-typecheck, test]
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - context: apps/api
            image: helios-api
          - context: apps/web
            image: helios-web
          - context: adapters/hue
            image: helios-adapter-hue
          - context: adapters/octopus
            image: helios-adapter-octopus
          - context: adapters/sonos
            image: helios-adapter-sonos
          - context: adapters/hikvision
            image: helios-adapter-hikvision
          - context: adapters/foxess
            image: helios-adapter-foxess
          - context: adapters/texecom
            image: helios-adapter-texecom
          - context: adapters/hive
            image: helios-adapter-hive

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.context }}/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Mac mini
    runs-on: ubuntu-latest
    needs: build-images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Wait for Tailscale connectivity
        continue-on-error: true
        run: tailscale ping --c 3 ${{ secrets.MAC_MINI_HOST }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.MAC_MINI_HOST }}
          username: ${{ secrets.MAC_MINI_USER }}
          key: ${{ secrets.MAC_MINI_SSH_KEY }}
          envs: GHCR_TOKEN,GITHUB_ACTOR,GITHUB_SHA
          script: |
            export PATH="/usr/local/bin:/opt/homebrew/bin:$PATH"
            mkdir -p ~/.docker
            printf '{"auths":{"ghcr.io":{"auth":"%s"}}}\n' \
              "$(printf '%s:%s' "$GITHUB_ACTOR" "$GHCR_TOKEN" | base64)" \
              > ~/.docker/config.json
            cd ~/Solar
            git pull --ff-only
            HELIOS_VERSION=$GITHUB_SHA HELIOS_AGE_KEY_FILE=~/.config/helios/age.key bash infra/scripts/decrypt-secrets.sh
            cd infra/compose
            HELIOS_VERSION=$GITHUB_SHA docker compose pull
            HELIOS_VERSION=$GITHUB_SHA docker compose up -d
            docker compose ps
