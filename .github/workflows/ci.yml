name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:

  lint-typecheck:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Get Yarn cache directory
        id: yarn-cache
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build shared packages
        run: yarn workspace @helios/shared build

      - name: Typecheck
        run: yarn typecheck

      - name: Lint
        run: yarn lint

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Get Yarn cache directory
        id: yarn-cache
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run tests
        run: yarn test

  container-build:
    name: Container builds
    runs-on: ubuntu-latest
    needs: [lint-typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build enabled service images
        run: |
          docker build -f apps/api/Dockerfile -t helios-api:ci .
          docker build -f apps/web/Dockerfile -t helios-web:ci .
          docker build -f adapters/octopus/Dockerfile -t helios-adapter-octopus:ci .
          docker build -f adapters/foxess/Dockerfile -t helios-adapter-foxess:ci .
          docker build -f adapters/hue/Dockerfile -t helios-adapter-hue:ci .
          docker run --rm --entrypoint node helios-adapter-octopus:ci -e "import('@helios/adapter-sdk')"
          docker run --rm --entrypoint node helios-adapter-foxess:ci -e "import('@helios/adapter-sdk')"
          docker run --rm --entrypoint node helios-adapter-hue:ci -e "import('@helios/adapter-sdk')"

  deploy:
    name: Build on Mac mini & deploy
    runs-on: ubuntu-latest
    needs: [lint-typecheck, test, container-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Wait for Tailscale connectivity
        continue-on-error: true
        run: tailscale ping --c 3 ${{ secrets.MAC_MINI_HOST }}

      - name: Build, push & deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ github.token }}
        with:
          host: ${{ secrets.MAC_MINI_HOST }}
          username: ${{ secrets.MAC_MINI_USER }}
          key: ${{ secrets.MAC_MINI_SSH_KEY }}
          envs: GHCR_TOKEN,GITHUB_ACTOR,GITHUB_SHA
          command_timeout: 20m
          script: |
            set -euo pipefail
            export PATH="/usr/local/bin:/opt/homebrew/bin:$PATH"
            printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            cd ~/Solar
            git pull --ff-only
            HELIOS_AGE_KEY_FILE=~/.config/helios/age.key bash infra/scripts/decrypt-secrets.sh
            REPO=ghcr.io/ianeharris
            export HELIOS_VERSION="$GITHUB_SHA"
            build_push() {
              local ctx=$1 img=$2
              echo ">>> building $img:$GITHUB_SHA"
              docker build -f "$ctx/Dockerfile" -t "$REPO/$img:$GITHUB_SHA" . \
                && docker push "$REPO/$img:$GITHUB_SHA"
            }
            build_push apps/api           helios-api
            build_push apps/web           helios-web
            build_push adapters/octopus   helios-adapter-octopus
            build_push adapters/foxess    helios-adapter-foxess
            build_push adapters/hue       helios-adapter-hue
            cd infra/compose
            docker compose up -d --force-recreate
            docker compose ps
            sleep 10
            running_services="$(docker compose ps --status running --services)"
            for service in api adapter-octopus adapter-foxess adapter-hue; do
              if ! printf '%s\n' "$running_services" | grep -qx "$service"; then
                echo "ERROR: $service is not running after deployment" >&2
                docker compose logs --tail=100 "$service" >&2 || true
                exit 1
              fi
            done
