name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  lint-typecheck:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Get Yarn cache directory
        id: yarn-cache
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build shared packages
        run: yarn workspace @helios/shared build

      - name: Typecheck
        run: yarn typecheck

      - name: Lint
        run: yarn lint

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Get Yarn cache directory
        id: yarn-cache
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run tests
        run: yarn test

  deploy:
    name: Build on Mac mini & deploy
    runs-on: ubuntu-latest
    needs: [lint-typecheck, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Wait for Tailscale connectivity
        continue-on-error: true
        run: tailscale ping --c 3 ${{ secrets.MAC_MINI_HOST }}

      - name: Build, push & deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.MAC_MINI_HOST }}
          username: ${{ secrets.MAC_MINI_USER }}
          key: ${{ secrets.MAC_MINI_SSH_KEY }}
          envs: GHCR_TOKEN,GITHUB_ACTOR,GITHUB_SHA
          command_timeout: 20m
          script: |
            export PATH="/usr/local/bin:/opt/homebrew/bin:$PATH"
            mkdir -p ~/.docker
            printf '{"auths":{"ghcr.io":{"auth":"%s"}}}\n' \
              "$(printf '%s:%s' "$GITHUB_ACTOR" "$GHCR_TOKEN" | base64)" \
              > ~/.docker/config.json
            cd ~/Solar
            git pull --ff-only
            HELIOS_AGE_KEY_FILE=~/.config/helios/age.key bash infra/scripts/decrypt-secrets.sh
            REPO=ghcr.io/ianeharris
            build_push() {
              local ctx=$1 img=$2
              echo ">>> building $img:$GITHUB_SHA"
              docker build -f "$ctx/Dockerfile" -t "$REPO/$img:$GITHUB_SHA" . \
                && docker push "$REPO/$img:$GITHUB_SHA"
            }
            build_push apps/api           helios-api
            build_push apps/web           helios-web
            build_push adapters/octopus   helios-adapter-octopus
            build_push adapters/foxess    helios-adapter-foxess
            cd infra/compose
            HELIOS_VERSION="$GITHUB_SHA" docker compose up -d --force-recreate
            docker compose ps
